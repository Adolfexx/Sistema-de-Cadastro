<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{alunos/fragments/head :: head(${aluno.id != null ? 'Editar Aluno' : 'Novo Aluno'})}"></head>
<body>
<div class="container">
    <h1 th:text="${aluno.id != null ? 'Editar Aluno' : 'Novo Aluno'}">Formulário</h1>

    <form th:action="@{/alunos/salvar}" th:object="${aluno}" method="post" class="form">
        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{dataMatricula}">

        <div class="form-group">
            <label>Nome:</label>
            <input type="text" th:field="*{nome}" class="form-control" placeholder="Nome completo">
            <span class="error" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
        </div>

        <div class="form-group">
            <label>E-mail:</label>
            <input type="email" th:field="*{email}" class="form-control" placeholder="email@exemplo.com">
            <span class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
        </div>

        <div class="form-group">
            <label>Curso:</label>
            <select th:field="*{curso}" class="form-control">
                <option value="">Selecione...</option>
                <option value="Engenharia de Software">Engenharia de Software</option>
                <option value="Sistemas de Informação">Sistemas de Informação</option>
                <option value="Ciência da Computação">Ciência da Computação</option>
                <option value="Análise e Desenvolvimento de Sistemas">Análise e Desenvolvimento de Sistemas</option>
            </select>
            <span class="error" th:if="${#fields.hasErrors('curso')}" th:errors="*{curso}"></span>
        </div>

        <div class="form-group">
            <label>Período (1 a 10):</label>
            <input type="number" th:field="*{periodo}" min="1" max="10" class="form-control">
            <span class="error" th:if="${#fields.hasErrors('periodo')}" th:errors="*{periodo}"></span>
        </div>

        <div class="form-group">
            <label>Data de Nascimento:</label>
            <input type="date" th:field="*{dataNascimento}" class="form-control">
            <span class="error" th:if="${#fields.hasErrors('dataNascimento')}" th:errors="*{dataNascimento}"></span>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Salvar</button>
            <a th:href="@{/alunos}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
</body>
</html>
